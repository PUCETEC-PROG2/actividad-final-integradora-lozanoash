<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estigma | Minimal Streetwear</title>
    <link rel="stylesheet" href="assets/css/contactos.css">
</head>

<body>
    <header>
        <div class="logo-estigma">
            <img src="assets/img/banners/estigma-logo.png" alt="logo Estigma" class="logo-top">
        </div>
        <div class="header-text">
            <h1>ESTIGMA</h1>
            <nav class="nav-principal">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="categorias.html">Categorías</a></li>
                    <li><a href="producto.html">Productos</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="contacto-content">
        <section class="info-texto">
            <h2>CONTACTO</h2>
            <p>Escríbenos para cualquier duda sobre la marca o tu pedido.</p>
            <address>
                <p>📍 Quito, Ecuador</p>
            </address>
        </section>

        <form id="formulario-contacto" class="formulario-estigma">
            <label for="nombre">NOMBRE</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

            <label for="email">EMAIL</label>
            <input type="email" id="email" name="email" placeholder="tu@correo.com" required>

            <label for="mensaje">MENSAJE</label>
            <textarea id="mensaje" name="mensaje" rows="5" placeholder="¿En qué podemos ayudarte?" required></textarea>

            <button type="submit" class="btn-enviar">ENVIAR</button>

            <p id="mensaje-exito" style="display: none; color: green; margin-top: 10px; font-weight: bold;">
                ¡Mensaje enviado con éxito!
            </p>
        </form>
    </main>

    <footer>
    <div class="footer-container">
        <div class="footer-info">
            <p>&copy; 2026 Estigma Urban Store - Quito, Ecuador.</p>
            <p>Desarrollado para la Actividad Final Integradora de Desarrollo Web.</p>
        </div>
        
        <div class="footer-redes">
            <img src="assets/img/banners/facebook-log.png" alt="logo facebook" class="logo-red">
            <img src="assets/img/banners/inst-logo.png" alt="logo instagram" class="logo-red">
            <img src="assets/img/banners/tiktok-log.png" alt="logo tiktok" class="logo-red">
        </div>
    </div>
</footer>
</body>

</html>
